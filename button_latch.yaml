# -------------------------
# BOUTON MAINTENANCE
# -------------------------
binary_sensor:

  - platform: gpio
    pin:
      number: ${switch_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "Maintenance bouton"

    filters:
      - delayed_on: 50ms   # anti-rebond

    id: user_button

