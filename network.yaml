# -------------------------
# WIFI OPTIMISÉ SOLAIRE
# -------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  power_save_mode: light

  manual_ip:
    static_ip: ${network_ip}
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1

# -------------------------
# AP
# -------------------------
  ap:
    ssid: "${device_name}_AP"
    password: !secret ap_password

# -------------------------
# API
# -------------------------
api:
  encryption:
    key:  "${api_key}"

# -------------------------
# TEMPS
# -------------------------
time:
  - platform: sntp
    id: ntp_time

# -------------------------
# UPDATE OverTheAir
# -------------------------
ota:
  - platform: esphome
    password: !secret ota_password  
    on_begin:
      then:
        - logger.log: "OTA start"
    on_progress:
      then:
        - logger.log:
            format: "OTA progress %0.1f%%"
            args: ["x"]
    on_end:
      then:
        - logger.log: "OTA end"

    on_error:
      then:
        - logger.log:
            format: "OTA update error %d"
            args: ["x"]
    on_state_change:
      then:
        - if:
            condition:
              lambda: return state == ota::OTA_STARTED;
            then:
              - logger.log: "OTA start"   
# -------------------------
# MQTT
# -------------------------
mqtt:
  broker: !secret mqtt_broker
  port: 8883
  username: !secret mqtt_username
  password: !secret mqtt_password

  client_id: "myfoxhome"

  # TLS with Let's Encrypt CA
  certificate_authority: !secret mqtt_certificate
   

  topic_prefix: ${topic}/${device_name}

  keepalive: 60s
  discovery: true

  on_connect:
    then:
      - lambda: |-
          id(mqtt_ready) = true;

  on_disconnect:
    then:
      - lambda: |-
          id(mqtt_ready) = false;

  birth_message:
    topic: ${topic}/${device_name}
    payload: online
    qos: 1
    retain: true

  will_message:
    topic: ${topic}/${device_name}
    payload: offline
    qos: 1
    retain: true

  log_topic:
    topic: ${topic}/${device_name}
    qos: 0


script:

  - id: mqtt_publish_go_sleep
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(mqtt_ready);
          then:
            - mqtt.publish:
                topic: ${topic}/${device_name}
                payload: "sleep"


# -------------------------
# WEB
# -------------------------
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password